<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DB8E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A56;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DB8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ECCE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ECCE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7FD9F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lightbulb (idea) - left -->
  <g id="lightbulb">
    <circle cx="60" cy="140" r="28" fill="url(#grad2)" opacity="0.9"/>
    <path d="M 60 165 Q 50 170 50 180 L 70 180 Q 70 170 60 165 Z" fill="url(#grad2)" opacity="0.9"/>
    <line x1="55" y1="183" x2="65" y2="183" stroke="url(#grad2)" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Brain/Agent (top center) -->
  <g id="brain">
    <rect x="100" y="30" width="56" height="56" rx="12" fill="url(#grad1)" opacity="0.9"/>
    <!-- Node dots -->
    <circle cx="115" cy="45" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="128" cy="38" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="141" cy="45" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="120" cy="60" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="136" cy="60" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="128" cy="72" r="3.5" fill="rgba(255,255,255,0.8)"/>
    <!-- Connection lines -->
    <line x1="115" y1="45" x2="120" y2="60" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="128" y1="38" x2="128" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <line x1="141" y1="45" x2="136" y2="60" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>

  <!-- Artifact (right) -->
  <g id="artifact">
    <rect x="168" y="110" width="56" height="56" rx="12" fill="url(#grad3)" opacity="0.9"/>
    <!-- Document lines -->
    <line x1="182" y1="128" x2="210" y2="128" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="182" y1="142" x2="210" y2="142" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="182" y1="156" x2="196" y2="156" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Feedback (bottom) -->
  <g id="feedback">
    <rect x="100" y="190" width="56" height="56" rx="12" fill="url(#grad4)" opacity="0.9"/>
    <!-- Feedback arrow/loop icon -->
    <path d="M 115 210 Q 128 205 141 210 Q 135 220 128 225 Q 121 220 115 210" fill="rgba(255,255,255,0.6)"/>
    <circle cx="128" cy="220" r="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  </g>

  <!-- Connecting arrows -->
  <!-- Lightbulb to Brain -->
  <path d="M 85 130 Q 110 80 118 86" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Brain to Artifact -->
  <path d="M 156 58 Q 180 85 175 110" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Artifact to Feedback -->
  <path d="M 168 158 Q 145 180 156 190" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Feedback to Lightbulb -->
  <path d="M 100 210 Q 75 180 75 160" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="url(#grad1)"/>
    </marker>
  </defs>

  <!-- Text: annotron -->
  <text x="128" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#1B1A3D" letter-spacing="-0.5">
    annotron
  </text>
</svg>
