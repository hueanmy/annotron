<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DB8E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A56;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DB8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ECCE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ECCE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7FD9F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Center circle (agent/brain) -->
  <circle cx="64" cy="40" r="20" fill="url(#grad1)"/>
  <circle cx="55" cy="32" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="64" cy="28" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="73" cy="32" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="58" cy="42" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="70" cy="42" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="64" cy="50" r="2" fill="rgba(255,255,255,0.8)"/>

  <!-- Left circle (lightbulb/idea) -->
  <circle cx="32" cy="74" r="18" fill="url(#grad2)"/>
  <!-- Bulb top -->
  <circle cx="32" cy="70" r="6" fill="url(#grad2)"/>
  <!-- Filament -->
  <line x1="32" y1="76" x2="32" y2="82" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8"/>

  <!-- Right circle (artifact) -->
  <circle cx="96" cy="74" r="18" fill="url(#grad3)"/>
  <!-- Document lines -->
  <line x1="88" y1="70" x2="104" y2="70" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="76" x2="104" y2="76" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="82" x2="100" y2="82" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom circle (feedback) -->
  <circle cx="64" cy="104" r="18" fill="url(#grad4)"/>
  <!-- Feedback loops -->
  <path d="M 56 100 Q 52 104 56 108" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 72 100 Q 76 104 72 108" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Connecting curves -->
  <!-- Top to Left -->
  <path d="M 48 50 Q 30 55 32 56" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Left to Bottom -->
  <path d="M 32 92 Q 30 100 50 108" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Bottom to Right -->
  <path d="M 78 108 Q 98 100 96 92" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Right to Top -->
  <path d="M 96 56 Q 98 55 80 50" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Arrow heads (small triangles) -->
  <polygon points="48,50 45,48 47,53" fill="url(#grad1)" opacity="0.9"/>
  <polygon points="50,108 46,109 52,105" fill="url(#grad1)" opacity="0.9"/>
  <polygon points="96,92 100,89 94,94" fill="url(#grad1)" opacity="0.9"/>
  <polygon points="80,50 83,48 78,53" fill="url(#grad1)" opacity="0.9"/>
</svg>
